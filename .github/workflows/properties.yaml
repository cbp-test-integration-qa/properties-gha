name: Property Verification Workflow

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROPERTIES: >
    {
      "TEST_ENV_VALUE_property": { "type": "string", "value": "test value"},
      "RETRY_COUNT_property": { "type": "boolean", "value": false},
      "FEATURE_FLAG_property": { "type": "number", "value": 5678}
    }

jobs:
  test-properties:
    runs-on: ubuntu-latest

    steps:
      - name: Initialize properties file
        run: |
          echo "$PROPERTIES" > properties.json

      - name: Update properties values
        run: |
          jq '.TEST_ENV_VALUE_property.value = "updated_value" |
              .FEATURE_FLAG_property.value = false |
              .RETRY_COUNT_property.value = 5' properties.json > temp.json
          mv temp.json properties.json

      - name: Parse properties and export env variables
        run: |
          TEST_ENV_VALUE_property=$(jq -r '.TEST_ENV_VALUE_property.value' properties.json)
          FEATURE_FLAG_property=$(jq -r '.FEATURE_FLAG_property.value' properties.json)
          RETRY_COUNT_property=$(jq -r '.RETRY_COUNT_property.value' properties.json)

          echo "TEST_ENV_VALUE_property=$TEST_ENV_VALUE_property" >> $GITHUB_ENV
          echo "FEATURE_FLAG_property=$FEATURE_FLAG_property" >> $GITHUB_ENV
          echo "RETRY_COUNT_property=$RETRY_COUNT_property" >> $GITHUB_ENV

      - name: Validate properties and generate report
        run: |
          REPORT_FILE=validation_report.txt
          STATUS=0

          echo "Property Validation Report" > $REPORT_FILE
          echo "==========================" >> $REPORT_FILE

          echo "String Value: $TEST_ENV_VALUE_property" >> $REPORT_FILE
          if [ "$TEST_ENV_VALUE_property" = "updated_value" ]; then
            echo "String Validation: PASS" >> $REPORT_FILE
          else
            echo "String Validation: FAIL" >> $REPORT_FILE
            STATUS=1
          fi

          echo "" >> $REPORT_FILE

          echo "Boolean Value: $FEATURE_FLAG_property" >> $REPORT_FILE
          if [ "$FEATURE_FLAG_property" = "true" ] || [ "$FEATURE_FLAG_property" = "false" ]; then
            echo "Boolean Validation: PASS" >> $REPORT_FILE
          else
            echo "Boolean Validation: FAIL" >> $REPORT_FILE
            STATUS=1
          fi

          echo "" >> $REPORT_FILE

          echo "Number Value: $RETRY_COUNT_property" >> $REPORT_FILE
          if [[ "$RETRY_COUNT_property" =~ ^[0-9]+$ ]]; then
            echo "Number Validation: PASS" >> $REPORT_FILE
          else
            echo "Number Validation: FAIL" >> $REPORT_FILE
            STATUS=1
          fi

          echo "==========================" >> $REPORT_FILE

          cat $REPORT_FILE

          exit $STATUS

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: property-validation-report
          path: validation_report.txt
